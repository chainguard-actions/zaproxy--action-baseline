name: Test ZAP Baseline Scan - Rules File
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          target: 'https://www.example.com'
          rules_file_name: 'actions/hardened/zaproxy--action-baseline/v0.13.0/tests/fixtures/zap-rules.tsv'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap_scan_rules_file'
        continue-on-error: true
      - name: Assert action ran with rules_file_name
        run: |
          echo "Action completed with rules_file_name input"
          echo "PASS"
