name: Test basic usage with target
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          target: 'https://www.example.com'
          fail_action: false
          allow_issue_writing: false
        continue-on-error: true
      - name: Assert action ran
        run: |
          echo "Action completed (exit may be non-zero due to scan findings)"
          echo "PASS"
